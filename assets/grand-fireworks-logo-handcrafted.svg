      <stop offset="0.42" stop-color="#168df2"/>
      <stop offset="0.78" stop-color="#00d8ee"/>
      <stop offset="1" stop-color="#b9ffff"/>
    </linearGradient>
    <linearGradient id="cyan-b" x1="455" y1="665" x2="111" y2="423" gradientUnits="userSpaceOnUse">
