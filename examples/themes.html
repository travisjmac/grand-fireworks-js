--><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="author" content="Travis MacDonald"><meta name="creator" content="Travis MacDonald"><meta name="application-name" content="Grand Fireworks JS"><meta name="description" content="Explore curated Grand Fireworks color themes — ice blue, ember red, neon green, golden, and mixed multi-palette rows."><meta name="version" content="1.4.0"><meta name="date" content="2026-07-15"><meta name="website" content="http://travisandjoelyweareaperfect.fit/"><meta name="repository" content="https://github.com/travisjmac/grand-fireworks-js"><meta property="og:type" content="website"><meta property="og:site_name" content="Grand Fireworks JS"><meta property="og:title" content="Grand Fireworks JS — Color Themes"><meta property="og:description" content="Explore curated color palettes for Grand Fireworks — ice blue, ember red, neon green, golden, and mixed."><meta property="og:url" content="https://travisjmac.github.io/grand-fireworks-js/examples/themes.html"><meta name="twitter:card" content="summary_large_image"><link rel="author" href="http://travisandjoelyweareaperfect.fit/"><link rel="help" href="https://github.com/travisjmac/grand-fireworks-js"><title>Color Themes — Grand Fireworks</title><style>*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#02030a;color:white;font:15px/1.5 system-ui,sans-serif;overflow:hidden}.back{position:fixed;z-index:10002;left:12px;top:12px;color:rgba(255,255,255,.6);background:rgba(8,10,25,.85);border:1px solid rgba(255,255,255,.15);padding:7px 11px;border-radius:8px;text-decoration:none;font-size:13px;backdrop-filter:blur(6px)}.back:hover{color:#fff;border-color:rgba(255,255,255,.4)}.panel{position:fixed;z-index:10001;left:50%;bottom:20px;transform:translateX(-50%);width:min(520px,calc(100% - 24px));background:rgba(3,4,14,.92);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:14px 16px 16px;box-shadow:0 8px 40px rgba(0,0,0,.7);backdrop-filter:blur(10px);text-align:center}.panel h2{margin:0 0 6px;font-size:13px;font-weight:600;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.5px}.theme-grid{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}.theme-btn{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:white;border-radius:8px;padding:7px 12px;cursor:pointer;font:inherit;font-size:12px;transition:all .15s;white-space:nowrap}.theme-btn:hover{background:rgba(255,255,255,.14);transform:translateY(-1px)}.theme-btn.active{border-color:rgba(255,215,0,.5);background:rgba(255,215,0,.12);color:#ffdc68;box-shadow:0 0 12px rgba(255,215,0,.1)}.swatch-row{display:flex;gap:3px;justify-content:center;margin:8px 0 4px;flex-wrap:wrap}.swatch{width:18px;height:18px;border-radius:50%;border:1px solid rgba(255,255,255,.15);display:inline-block}.theme-name{font-size:11px;color:rgba(255,255,255,.5);margin:6px 0 0}.theme-name strong{color:rgba(255,255,255,.85)}@media(max-width:480px){.panel{bottom:10px;padding:12px 14px 14px}.theme-btn{font-size:11px;padding:6px 10px}.swatch{width:14px;height:14px}}</style></head><body><div class="back-row"><a class="back" href="../index.html">← Documentation</a><button id="sound-btn" class="sound-btn">🔇 Sound</button></div><div id="stage" style="position:fixed;inset:0;z-index:0"></div><aside class="panel" id="panel"><h2>🎨 Color Themes</h2><div class="swatch-row" id="active-swatches"></div><div class="theme-grid" id="theme-buttons"></div><p class="theme-name" id="theme-label"></p></aside><script src="../GrandFireworks.js"></script><script>
(()=>{
  'use strict';

  const THEMES = {
    iceBlue: {
      label: '❄️ Ice Blue',
      palettes: [
        ['#00BFFF','#E0FFFF'],['#1E90FF','#87CEEB','#FFFFFF'],['#00CED1'],
        ['#4169E1','#00BFFF','#E0FFFF','#FFFFFF'],['#87CEFA','#B0E0E6','#F0F8FF'],['#00BFFF','#1E90FF','#FFFFFF']
      ],
      desc: 'All blues — cyan, sky, navy, ice — a cool unified theme'
    },
    emberRed: {
      label: '🔥 Ember Red',
      palettes: [
        ['#FF4500','#FFD700'],['#DC143C','#FF6347','#FFFFFF'],['#FF0000'],
        ['#8B0000','#FF4500','#FFD700','#FFFFFF'],['#FF6347','#FF7F50','#FFE4E1'],['#DC143C','#FF8C00','#FFFFFF']
      ],
      desc: 'Warm reds, oranges, and gold — like glowing embers'
    },
    neonGreen: {
      label: '💚 Neon Green',
      palettes: [
        ['#00FF7F','#7FFF00'],['#32CD32','#ADFF2F','#FFFFFF'],['#00FF00'],
        ['#006400','#00FF7F','#7FFF00','#FFFFFF'],['#7CFC00','#98FB98','#F0FFF0'],['#32CD32','#00FA9A','#FFFFFF']
      ],
      desc: 'Vibrant greens — lime, emerald, spring — fresh and electric'
    },
    goldenSun: {
      label: '☀️ Golden Sun',
      palettes: [
        ['#FFD700','#FFA500'],['#FFD700','#FFFACD','#FFFFFF'],['#FFC125'],
        ['#B8860B','#FFD700','#FFE4B5','#FFFFFF'],['#F0E68C','#FFF8DC','#FAFAD2'],['#DAA520','#FFD700','#FFFFFF']
      ],
      desc: 'Warm golds, yellows, and amber — bright and celebratory'
    },
    royalPurple: {
      label: '👑 Royal Purple',
      palettes: [
        ['#8A2BE2','#DDA0DD'],['#9400D3','#BA55D3','#FFFFFF'],['#9932CC'],
        ['#4B0082','#8A2BE2','#DA70D6','#FFFFFF'],['#9370DB','#D8BFD8','#E6E6FA'],['#800080','#BA55D3','#FFFFFF']
      ],
      desc: 'Purples and violets — from deep plum to soft lavender'
    },
    mixedWarm: {
      label: '🌈 Mixed Warm',
      palettes: [
        ['#FF4500','#FFD700'],['#DC143C','#FF69B4','#FFFFFF'],
        ['#FFD700','#FFA500','#FFFFFF'],['#FF6347','#FFD700','#7FFF00']
      ],
      desc: 'Red, orange, gold, green — a warm multi-palette blend'
    },
    mixedCool: {
      label: '🌊 Mixed Cool',
      palettes: [
        ['#00BFFF','#E0FFFF'],['#8A2BE2','#DA70D6','#FFFFFF'],
        ['#00CED1','#40E0D0','#FFFFFF'],['#1E90FF','#9400D3','#E0FFFF']
      ],
      desc: 'Blue, teal, purple, ice — a cool multi-palette blend'
    },
    mixedFestival: {
      label: '🎉 Festival Mix',
      palettes: [
        ['#FF0055','#FFCC00'],['#00F2FE','#4FACFE'],['#FFD700','#FFA500','#FFFFFF'],
        ['#FF1493','#FF69B4','#FFC0CB','#FFFFFF'],['#00E676','#69F0AE','#FFFFFF'],
        ['#AA00FF','#D17FE0','#EA80FC','#FFFFFF'],['#FF4500','#FFD700','#7FFF00']
      ],
      desc: 'Every color — pink, gold, cyan, green, purple — full-spectrum celebration'
    }
  };

  const clamp=(n,a,b)=>Math.max(a,Math.min(b,n));
  const hexToRgb=h=>{const c=h.replace('#','');const n=parseInt(c.length===3?c.split('').map(x=>x+x).join(''):c,16);return[(n>>16&255)/255,(n>>8&255)/255,(n&255)/255];};

  // Recolor all existing particles and rockets to match the current palette
  function recolorExisting(fw){
    const palette=fw._palette();
    if(!palette||palette.length===0)return;
    const colors=palette.map(hexToRgb);
    fw.particles.forEach((p,i)=>{const c=colors[i%colors.length];p.r=c[0];p.g=c[1];p.b=c[2];});
    fw.rockets.forEach(r=>{r.colors=palette;});
  }

  let fireworks=null;

  function buildSwatches(colors){
    const container=document.querySelector('#active-swatches');
    container.innerHTML='';
    // Collect all unique colors from all palettes
    const all=[];
    for(const p of colors) Array.isArray(p)?all.push(...p):all.push(p);
    const unique=[...new Set(all)];
    for(const c of unique.slice(0,12)){
      const dot=document.createElement('span');dot.className='swatch';dot.style.background=c;
      container.appendChild(dot);
    }
  }

  function applyTheme(key){
    const theme=THEMES[key];
    if(!theme)return;

    // Update button states
    document.querySelectorAll('.theme-btn').forEach(b=>b.classList.toggle('active',b.dataset.key===key));

    // Update swatches and label
    buildSwatches(theme.palettes);
    document.querySelector('#theme-label').innerHTML=`<strong>${theme.label}</strong> — ${theme.desc}`;

    // Build config with these palettes
    const cfg={
      autoStart:true,
      mode:'fullscreen',
      placement:'background',
      visuals:{
        opacity:.45,
        trails:true,
        trailFade:.12,
        bloom:1.15,
        rocketExhaust:true,
        explosionFlashes:true,
        starChance:.06,
        groupedSalvos:true,
        secondaryCrackle:true
      },
      performance:{preset:'high',adaptive:true},
      show:{
        intensity:.8,
        openingSalvo:5,
        launchInterval:900,
        launchSpread:.6,
        angleRange:16,
        angleStrength:1,
        enabledTypes:'all',
        palettes:theme.palettes
      },
      transition:{fadeIn:500,fadeOut:400,easing:'ease-out',clearOnHide:true}
    };

    if(!fireworks){
      cfg.container='#stage';
      fireworks=new GrandFireworks(cfg);
    } else {
      cfg.container='#stage';
      cfg.mode='fullscreen';
      cfg.autoStart=true;
      fireworks.setOptions(cfg);
      if(fireworks.root) fireworks.root.style.opacity=String(clamp(Number(cfg.visuals?.opacity ?? 1),0,1));
      recolorExisting(fireworks);
    }
  }

  // Build theme buttons
  const grid=document.querySelector('#theme-buttons');
  let firstKey=null;
  for(const [key,theme] of Object.entries(THEMES)){
    if(!firstKey)firstKey=key;
    const btn=document.createElement('button');
    btn.className='theme-btn';
    btn.dataset.key=key;
    btn.textContent=theme.label;
    btn.addEventListener('click',()=>applyTheme(key));
    grid.appendChild(btn);
  }

  // Apply first theme on load
  applyTheme(firstKey);
let soundOn=false;document.querySelector('#sound-btn').addEventListener('click',()=>{soundOn=!soundOn;if(soundOn)fireworks.enableSound();else fireworks.disableSound();event.target.textContent=soundOn?'🔊 Sound':'🔇 Sound';});
})();
</script><footer class="grand-fireworks-creator-credit" style="position:fixed;left:0;right:0;bottom:6px;z-index:2147483646;text-align:center;font:400 11px/1 system-ui,sans-serif;color:rgba(255,255,255,.22);pointer-events:none;user-select:none">Grand Fireworks JS v1.4.0 · <a href="http://travisandjoelyweareaperfect.fit/" style="color:rgba(255,255,255,.22);text-decoration:none">Travis MacDonald</a> · <a href="https://github.com/travisjmac/grand-fireworks-js" style="color:rgba(255,255,255,.22);text-decoration:none">GitHub</a></footer></body></html>
