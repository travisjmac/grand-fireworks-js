art</button><button onclick="fireworks.stop()">Stop</button></div><pre id="config"></pre></aside><script src="../GrandFireworks.js"></script><script>const opts={autoStart:true,background:{value:'radial-gradient(circle at center, rgba(8,12,40,.65), #000 82%)',opacity:.94},transition:{fadeIn:900,fadeOut:750,easing:'ease-out',clearOnHide:true},performance:{preset:'high',adaptive:true}};document.querySelector('#config').textContent=`const fireworks = new GrandFireworks(${JSON.stringify(opts,null,2)});`;const fireworks=new GrandFireworks(opts);let soundOn=false;document.querySelector('#sound-btn').addEventListener('click',()=>{soundOn=!soundOn;if(soundOn)fireworks.enableSound();else fireworks.disableSound();event.target.textContent=soundOn?'🔊 Sound':'🔇 Sound';});</script><footer class="grand-fireworks-creator-credit" style="position:fixed;left:0;right:0;bottom:6px;z-index:2147483646;text-align:center;font:400 11px/1 system-ui,sans-serif;color:rgba(255,255,255,.22);pointer-events:none;user-select:none">Grand Fireworks JS v1.4.0 · <a href="http://travisandjoelyweareaperfect.fit/" style="color:rgba(255,255,255,.22);text-decoration:none">Travis MacDonald</a> · <a href="https://github.com/travisjmac/grand-fireworks-js" style="color:rgba(255,255,255,.22);text-decoration:none">GitHub</a></footer></body></html>
