(10px)}.panel h2{margin:0 0 2px;font-size:13px;font-weight:600;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.5px}.panel pre{white-space:pre-wrap;margin:6px 0 10px;color:rgba(255,255,255,.85);font-size:11px;line-height:1.4;max-height:140px;overflow:auto;font-family:ui-monospace,SFMono-Regular,Consolas,monospace;background:rgba(0,0,0,.3);padding:8px;border-radius:8px}.toolbar{display:flex;gap:6px;flex-wrap:wrap}.toolbar button{flex:1;min-width:56px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:white;border-radius:8px;padding:8px 10px;cursor:pointer;font:inherit;font-size:13px;transition:background .15s}.toolbar button:hover{background:rgba(255,255,255,.14)}.toolbar .lucky{background:rgba(255,215,0,.15);border-color:rgba(255,215,0,.35);color:#ffdc68;font-weight:600}.toolbar .lucky:hover{background:rgba(255,215,0,.25)}.toolbar .copy{background:rgba(100,200,255,.08);border-color:rgba(100,200,255,.2)}.toolbar .copy:hover{background:rgba(100,200,255,.18)}.toolbar .nav{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.08)}.toolbar .nav:disabled{opacity:.25;cursor:default}.nav-info{font-size:11px;color:rgba(255,255,255,.3);text-align:center;padding:4px 0 0;flex:1 1 100%}.lucky .spinner{display:none;width:14px;height:14px;border:2px solid rgba(255,215,0,.2);border-top-color:#ffdc68;border-radius:50%;vertical-align:middle}.lucky.spinning{pointer-events:none;opacity:.7}.lucky.spinning .spinner{display:inline-block;animation:lucky-spin .7s linear infinite}.lucky.spinning .label-text{display:none}@keyframes lucky-spin{to{transform:rotate(360deg)}}@media(max-width:480px){.panel{bottom:10px;padding:12px 14px 14px}.panel pre{max-height:100px;font-size:10px}.toolbar button{font-size:12px;padding:7px 8px}}</style></head><body><a class="back" href="../index.html">← Back</a><div id="stage" style="position:fixed;inset:0;z-index:0"></div><aside class="panel" id="panel"><h2>🎆 Lucky Config</h2><pre id="config-display"></pre><div class="toolbar"><button class="nav" id="prev-btn" disabled aria-label="Previous config">◀ Back</button><button class="lucky" id="lucky-btn"><span class="spinner"></span><span class="label-text">✨ I'm Feeling Lucky</span></button><button class="nav" id="next-btn" disabled aria-label="Next config">Forward ▶</button><button class="copy" id="copy-btn">📋 Copy</button></div><div class="toolbar" style="margin-top:4px"><select id="lucky-style" style="flex:1;border:1px solid rgba(255,255,255,.1);background:rgba(3,4,14,.92);color:white;border-radius:8px;padding:6px 8px;font:500 12px/1 system-ui,sans-serif;cursor:pointer"><option value="classic">Style: Classic</option><option value="oldSchool">Style: Old School</option><option value="thin">Style: Thin</option><option value="medium">Style: Medium</option><option value="bold">Style: Bold</option><option value="spectacle">Style: Spectacle</option></select><select id="lucky-theme" style="flex:1;border:1px solid rgba(255,255,255,.1);background:rgba(3,4,14,.92);color:white;border-radius:8px;padding:6px 8px;font:500 12px/1 system-ui,sans-serif;cursor:pointer"><option value="default">🎨 Default</option><option value="iceBlue">❄️ Ice Blue</option><option value="emberRed">🔥 Ember Red</option><option value="neonGreen">💚 Neon Green</option><option value="goldenSun">☀️ Golden Sun</option><option value="royalPurple">👑 Royal Purple</option><option value="festival">🎉 Festival</option></select></div><span class="nav-info" id="nav-info"></span></aside><script src="../GrandFireworks.js"></script><script>
(()=>{
  'use strict';

  const clamp=(n,a,b)=>Math.max(a,Math.min(b,n));

  // History management
  const history=[];
  let cursor=-1;
  let fireworks=null;

  function displayConfig(cfg){
    const el=document.querySelector('#config-display');
    el.textContent=`new GrandFireworks(${JSON.stringify(cfg,null,2)});`;
    document.querySelector('#nav-info').textContent=history.length>0?`${cursor+1} of ${history.length}`:'';
    document.querySelector('#prev-btn').disabled=cursor<=0;
    document.querySelector('#next-btn').disabled=cursor>=history.length-1;
  }

  function applyConfig(cfg){
    if(!fireworks){
      const config=JSON.parse(JSON.stringify(cfg));
      config.container='#stage';
      config.mode='fullscreen';
      config.autoStart=true;
      fireworks=new GrandFireworks(config);
      displayConfig(cfg);
    } else {
      // Restore a specific config from history
      const updated=JSON.parse(JSON.stringify(cfg));
      updated.container='#stage';
      updated.mode='fullscreen';
      updated.autoStart=true;
      fireworks.setOptions(updated);
      if(fireworks.root) fireworks.root.style.opacity=String(clamp(Number(cfg.visuals?.opacity??1),0,1));
      // Recolor existing particles
      const palette=fireworks._palette();
      if(palette&&palette.length){
        const colors=palette.map(h=>{const c=h.replace('#','');const n=parseInt(c.length===3?c.split('').map(x=>x+x).join(''):c,16);return[(n>>16&255)/255,(n>>8&255)/255,(n&255)/255];});
        fireworks.particles.forEach((p,i)=>{const c=colors[i%colors.length];p.r=c[0];p.g=c[1];p.b=c[2];});
        fireworks.rockets.forEach(r=>{r.colors=palette;});
      }
      document.querySelector('#lucky-style').value=fireworks.options.baseStyle||'medium';
      document.querySelector('#lucky-theme').value=fireworks.options.colorTheme||'default';
      displayConfig(cfg);
    }
  }

  function pushAndApply(cfg){
    if(cursor<history.length-1)history.splice(cursor+1);
    history.push(JSON.parse(JSON.stringify(cfg)));
    cursor=history.length-1;
    displayConfig(cfg);
    document.querySelector('#lucky-style').value=fireworks.options.baseStyle||'medium';
    document.querySelector('#lucky-theme').value=fireworks.options.colorTheme||'default';
  }

  function goBack(){
    if(cursor>0){cursor--;applyConfig(history[cursor]);}
  }

  function goForward(){
    if(cursor<history.length-1){cursor++;applyConfig(history[cursor]);}
  }

  // Initial: create fireworks, then generate first random look
  fireworks=new GrandFireworks({container:'#stage',mode:'fullscreen',placement:'background',autoStart:true});
  const firstCfg=fireworks.feelingLucky();
  history.push(JSON.parse(JSON.stringify(firstCfg)));
  cursor=0;
  displayConfig(firstCfg);
  document.querySelector('#lucky-style').value=fireworks.options.baseStyle||'medium';
  document.querySelector('#lucky-theme').value=fireworks.options.colorTheme||'default';

  document.querySelector('#lucky-btn').addEventListener('click',()=>{
    const btn=document.querySelector('#lucky-btn');
    btn.classList.add('spinning');
    setTimeout(()=>{
      const cfg=fireworks.feelingLucky();
      pushAndApply(cfg);
      btn.classList.remove('spinning');
    },600);
  });

  document.querySelector('#prev-btn').addEventListener('click',goBack);
  document.querySelector('#next-btn').addEventListener('click',goForward);

  document.querySelector('#copy-btn').addEventListener('click',async()=>{
    const text=document.querySelector('#config-display').textContent;
    await navigator.clipboard.writeText(text);
    const btn=document.querySelector('#copy-btn');
    const orig=btn.textContent;
    btn.textContent='✅ Copied!';
    setTimeout(()=>btn.textContent=orig,1200);
  });

  // Style dropdown
  document.querySelector('#lucky-style').addEventListener('change',function(){
    if(fireworks){fireworks.setStyle(this.value);fireworks.setOpacity(1);}
  });
  // Theme dropdown
  document.querySelector('#lucky-theme').addEventListener('change',function(){
    if(fireworks){fireworks.setColorTheme(this.value);}
  });

  // Keyboard shortcuts
  document.addEventListener('keydown',e=>{
    if(e.key==='l'||e.key==='L'){document.querySelector('#lucky-btn').click();e.preventDefault();}
    if(e.key==='ArrowLeft'){goBack();e.preventDefault();}
    if(e.key==='ArrowRight'){goForward();e.preventDefault();}
  });
})();
