'use strict';

/* ---------- utilities ---------- */
const $ = (s, p) => (p || document).querySelector(s);
const $$ = (s, p) => [...(p || document).querySelectorAll(s)];
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

function deepMerge(a, b) {
  const o = { ...a };
  for (const k of Object.keys(b || {})) {
    o[k] = a[k] && typeof a[k] === 'object' && !Array.isArray(a[k])
        && b[k] && typeof b[k] === 'object' && !Array.isArray(b[k])
      ? deepMerge(a[k], b[k])
      : b[k];
  }
  return o;
}

function setDeep(obj, path, val) {
  const parts = path.split('.');
  let cur = obj;
  for (let i = 0; i < parts.length - 1; i++) {
    if (!cur[parts[i]] || typeof cur[parts[i]] !== 'object') cur[parts[i]] = {};
    cur = cur[parts[i]];
  }
  cur[parts[parts.length - 1]] = val;
}

function getDeep(obj, path) {
  const parts = path.split('.');
  let cur = obj;
  for (const p of parts) { if (cur == null || typeof cur !== 'object') return undefined; cur = cur[p]; }
  return cur;
}

function shallowEqual(a, b) {
  if (a === b) return true;
  if (!a || !b) return false;
  const ka = Object.keys(a), kb = Object.keys(b);
  if (ka.length !== kb.length) return false;
  return ka.every(k => a[k] === b[k]);
}

/* ---------- presets ---------- */
const PRESET_DEFS = [
  { id: 'balanced',    label: 'Balanced',       icon: '⚖️',  config: { baseStyle: 'medium',   performance: { preset: 'high' } } },
  { id: 'subtle',      label: 'Subtle',         icon: '🌙',  config: { baseStyle: 'thin',     performance: { preset: 'low' }, visuals: { opacity: .6 } } },
  { id: 'classic',     label: 'Classic',        icon: '🕰️', config: { baseStyle: 'classic',  performance: { preset: 'medium' } } },
  { id: 'bold',        label: 'Bold',           icon: '💪',  config: { baseStyle: 'bold',     performance: { preset: 'high' } } },
  { id: 'spectacle',   label: 'Spectacle',      icon: '🎆',  config: { baseStyle: 'spectacle', performance: { preset: 'ultra' } } },
  { id: 'mobile',      label: 'Mobile Friendly', icon: '📱', config: { baseStyle: 'medium',   performance: { preset: 'low' }, show: { maxParticles: 1000, maxRockets: 3 } } }
];
const PRESET_MAP = Object.fromEntries(PRESET_DEFS.map(p => [p.id, p]));

/* ---------- section definitions ---------- */
const SECTIONS = {
  guided: {
    icon: '✨', label: 'Guided',
    desc: 'Pick one thing to change, preview it, then keep or revert.',
    options: [
      { id: 'style',       label: 'Style',           type: 'select', updateMode: 'live',
        choices: ['Classic','Old School','Thin','Medium','Bold','Spectacle'].map(v => ({ label: v, value: v.toLowerCase().replace(/\s+/g,'') })),
        apply: (c, v, fw) => { fw.setStyle(v); c.baseStyle = v; },
        summary: v => `${PRESET_MAP[v] ? PRESET_MAP[v].icon + ' ' : ''}${v.charAt(0).toUpperCase()+v.slice(1)} style`,
        tooltip: 'Overall look and feel — changes visuals and show behavior together' },
      { id: 'colorTheme',  label: 'Color theme',     type: 'select', updateMode: 'live',
        choices: [
          { label: '🌈 Default', value: 'default' }, { label: '❄️ Ice Blue', value: 'iceBlue' },
          { label: '🔥 Ember Red', value: 'emberRed' }, { label: '💚 Neon Green', value: 'neonGreen' },
          { label: '☀️ Golden Sun', value: 'goldenSun' }, { label: '👑 Royal Purple', value: 'royalPurple' },
          { label: '🎉 Festival', value: 'festival' }
        ],
        apply: (c, v, fw) => { fw.setColorTheme(v); c.colorTheme = v; },
        summary: v => { const m = { default:'🌈 Default', iceBlue:'❄️ Ice Blue', emberRed:'🔥 Ember Red', neonGreen:'💚 Neon Green', goldenSun:'☀️ Golden Sun', royalPurple:'👑 Royal Purple', festival:'🎉 Festival' }; return m[v] || v; },
        tooltip: 'Color palette for all fireworks bursts' },
      { id: 'fireworks',   label: 'Firework amount', type: 'select', updateMode: 'live',
        choices: [
          { label: '🙈 Minimal', value: JSON.stringify({maxRockets:2, launchInterval:1200}) },
          { label: '🌱 Fewer',   value: JSON.stringify({maxRockets:4, launchInterval:900}) },
          { label: '⚖️ Balanced', value: JSON.stringify({maxRockets:6, launchInterval:750}) },
          { label: '🚀 More',    value: JSON.stringify({maxRockets:10, launchInterval:550}) },
          { label: '🤯 Maximum', value: JSON.stringify({maxRockets:14, launchInterval:350}) }
        ],
        apply: (c, v, fw) => { const o = JSON.parse(v); c.show = deepMerge(c.show || {}, o); fw.setOptions({ show: o }); },
        summary: v => { const o = JSON.parse(v); return `Fireworks: ${o.maxRockets} rockets`; },
        tooltip: 'How many rockets launch at once and how often' },
      { id: 'density',     label: 'Particle density',  type: 'select', updateMode: 'live',
        choices: [
          { label: '🌬️ Light', value: '1500' }, { label: '⚖️ Balanced', value: '3000' },
          { label: '💥 Dense', value: '5000' }, { label: '✨ Spectacular', value: '8000' }
        ],
        apply: (c, v, fw) => { const n = Number(v); c.show = deepMerge(c.show||{}, {maxParticles:n}); fw.setOptions({show:{maxParticles:n}}); },
        summary: v => `Particles: ${v}`,
        tooltip: 'Number of particles per explosion' },
      { id: 'launchSpeed', label: 'Launch speed',   type: 'select', updateMode: 'live',
        choices: [
          { label: '😌 Relaxed', value: '1200' }, { label: '⚖️ Normal', value: '750' },
          { label: '⚡ Fast',     value: '550' }, { label: '🔥 Intense',  value: '350' }
        ],
        apply: (c, v, fw) => { const n = Number(v); c.show = deepMerge(c.show||{}, {launchInterval:n}); fw.setOptions({show:{launchInterval:n}}); },
        summary: v => `Speed: ${v}ms interval`,
        tooltip: 'How fast rockets launch — lower = faster' },
      { id: 'trails',      label: 'Trails',         type: 'toggle', updateMode: 'live',
        apply: (c, v, fw) => { c.visuals = deepMerge(c.visuals||{}, {trails:v}); fw.setOptions({visuals:{trails:v}}); },
        summary: v => v ? 'Trails on' : 'Trails off',
        tooltip: 'Luminous motion trails behind particles' },
      { id: 'glow',        label: 'Glow',           type: 'select', updateMode: 'live',
        choices: [
          { label: '🌫️ Low', value: '.7' }, { label: '⚖️ Medium', value: '1.25' },
          { label: '💡 High', value: '1.9' }
        ],
        apply: (c, v, fw) => { const n = Number(v); c.visuals = deepMerge(c.visuals||{}, {bloom:n}); fw.setOptions({visuals:{bloom:n}}); },
        summary: v => `Glow: ${v}`,
        tooltip: 'Brightness of the glow around explosions' },
      { id: 'stars',       label: 'Stars',          type: 'select', updateMode: 'live',
        choices: [
          { label: '❌ Off', value: '0' }, { label: '⭐ Few', value: '.05' },
          { label: '🌟🌟 Some', value: '.12' }, { label: '🌟🌟🌟 Many', value: '.2' }
        ],
        apply: (c, v, fw) => { const n = Number(v); c.visuals = deepMerge(c.visuals||{}, {starChance:n}); fw.setOptions({visuals:{starChance:n}}); },
        summary: v => v === '0' ? 'Stars off' : `Stars: ${v}`,
        tooltip: 'Chance each particle gets a sharp star core' },
      { id: 'performance', label: 'Performance',    type: 'select', updateMode: 'restart',
        choices: [
          { label: '📱 Mobile', value: 'low' }, { label: '⚖️ Balanced', value: 'medium' },
          { label: '🎯 High Quality', value: 'high' }, { label: '🚀 Ultra', value: 'ultra' }
        ],
        apply: (c, v, fw) => { c.performance = deepMerge(c.performance||{}, {preset:v}); },
        summary: v => { const m = { low:'📱 Mobile', medium:'⚖️ Balanced', high:'🎯 High Quality', ultra:'🚀 Ultra' }; return `Perf: ${m[v]||v}`; },
        tooltip: 'Quality/capacity preset — affects FPS, particles, and DPR cap' },
      { id: 'finale',      label: 'Grand Finale',    type: 'toggle', updateMode: 'live',
        apply: (c, v, fw) => { c.finale = deepMerge(c.finale||{}, {enabled:v}); fw.setOptions({finale:{enabled:v}}); },
        summary: v => v ? 'Finale on' : 'Finale off',
        tooltip: 'Trigger a choreographed grand finale on stop or duration end' }
    ]
  },
  visuals: {
    icon: '🎨', label: 'Visuals',
    desc: 'Control how bursts look — trails, glow, stars, and flash effects.',
    options: [
      { id: 'visuals.opacity',          label: 'Opacity',           type: 'number', min: 0, max: 1, step: .05, def: 1, updateMode: 'live',
        apply: (c,v,fw) => { c.visuals = deepMerge(c.visuals||{}, {opacity:v}); fw.setOptions({visuals:{opacity:v}}); },
        tooltip: 'Overall fireworks transparency' },
      { id: 'visuals.trails',           label: 'Trails',            type: 'toggle', def: true, updateMode: 'live',
        apply: (c,v,fw) => { c.visuals = deepMerge(c.visuals||{}, {trails:v}); fw.setOptions({visuals:{trails:v}}); },
        tooltip: 'Luminous motion trails behind particles' },
      { id: 'visuals.trailFade',        label: 'Trail fade',        type: 'number', min: .03, max: 1, step: .01, def: .115, updateMode: 'live',
        apply: (c,v,fw) => { c.visuals = deepMerge(c.visuals||{}, {trailFade:v}); fw.setOptions({visuals:{trailFade:v}}); },
        tooltip: 'How quickly trails fade — lower = longer tails' },
      { id: 'visuals.bloom',            label: 'Glow (bloom)',      type: 'number', min: .5, max: 2.5, step: .05, def: 1.25, updateMode: 'live',
        apply: (c,v,fw) => { c.visuals = deepMerge(c.visuals||{}, {bloom:v}); fw.setOptions({visuals:{bloom:v}}); },
        tooltip: 'Glow intensity around explosions' },
      { id: 'visuals.rocketExhaust',    label: 'Rocket exhaust',    type: 'toggle', def: true, updateMode: 'live',
        apply: (c,v,fw) => { c.visuals = deepMerge(c.visuals||{}, {rocketExhaust:v}); fw.setOptions({visuals:{rocketExhaust:v}}); },
        tooltip: 'Sparks trailing behind ascending rockets' },
      { id: 'visuals.explosionFlashes', label: 'Explosion flashes', type: 'toggle', def: true, updateMode: 'live',
        apply: (c,v,fw) => { c.visuals = deepMerge(c.visuals||{}, {explosionFlashes:v}); fw.setOptions({visuals:{explosionFlashes:v}}); },
        tooltip: 'Bright flash at each burst point' },
      { id: 'visuals.starChance',       label: 'Star chance',       type: 'number', min: 0, max: .3, step: .01, def: .08, updateMode: 'live',
        apply: (c,v,fw) => { c.visuals = deepMerge(c.visuals||{}, {starChance:v}); fw.setOptions({visuals:{starChance:v}}); },
        tooltip: 'Probability each particle gets a sharp star core' },
      { id: 'visuals.groupedSalvos',    label: 'Grouped salvos',    type: 'toggle', def: true, updateMode: 'live',
        apply: (c,v,fw) => { c.visuals = deepMerge(c.visuals||{}, {groupedSalvos:v}); fw.setOptions({visuals:{groupedSalvos:v}}); },

const SECTION_KEYS = Object.keys(SECTIONS);

/* ---------- build quick-lookup maps ---------- */
const OPTION_MAP = {};
for (const sk of SECTION_KEYS) {
  for (const o of SECTIONS[sk].options) {
    o.section = sk;
    OPTION_MAP[o.id] = o;
  }
}

/* ---------- state ---------- */
const CORE_CONFIG = {
  autoStart: false, mode: 'fullscreen', placement: 'overlay',
  clip: true, zIndex: 9999, duration: 0, durationMode: 'graceful', maxFinishTime: 5000,
  sound: { enabled: false, volume: .3 }
};

const DEFAULT_CONFIG = deepMerge(deepMerge({}, CORE_CONFIG), PRESET_MAP.balanced.config);

const state = {
  committedConfig: deepMerge({}, DEFAULT_CONFIG),
  history: [],
  historyIndex: -1,
  startingPreset: 'balanced',
  currentPreset: 'balanced',
  activeTab: 'guided',
  guidedOption: null,
  guidedValue: null,
  isPreviewing: false,
  // track which non-default options have been changed (for summary chips)
  changes: new Map() // key -> {label, summary}
};

/* ---------- fireworks instance ---------- */
let fw = null;
const PREVIEW_EL = document.getElementById('preview-inner');

function initFireworks(config) {
  if (fw) { try { fw.destroy(); } catch(e) {} fw = null; }
  const merged = deepMerge({
    container: PREVIEW_EL,
    mode: 'contained'
  }, config);
  merged.autoStart = true; // ensure autoStart survives deepMerge
  fw = new GrandFireworks(merged);
  return fw;
}

function restartFireworks(config) {
  initFireworks(config);
}

function liveUpdate(partial) {
  if (!fw) return;
  try { fw.setOptions(partial); } catch(e) { /* ignore */ }
}

/* ---------- guided tab: get full config for a preset ---------- */
function resolvePresetConfig(presetId) {
  const p = PRESET_MAP[presetId];
  if (!p) return deepMerge({}, DEFAULT_CONFIG);
  return deepMerge(deepMerge({}, CORE_CONFIG), p.config);
}

/* ---------- get current effective config ---------- */
function effectiveConfig() {
  return state.isPreviewing ? state.draftConfig : state.committedConfig;
}

/* ---------- update preview from a config ---------- */
function applyConfigToPreview(config, isRestart) {
  const sectionId = state.activeTab === 'guided' && state.guidedOption
    ? OPTION_MAP[state.guidedOption]?.section : null;
  const opt = state.guidedOption ? OPTION_MAP[state.guidedOption] : null;
  const mode = opt ? opt.updateMode : (isRestart ? 'restart' : 'live');

  if (mode === 'restart') {
    restartFireworks(config);
  } else {
    // For live updates, we need to be smarter
    // Apply base config first, then selective updates
    // Actually, setOptions() merges, so passing the whole config is fine
    liveUpdate(config);
  }
}

/* ===========================================================
   UI Rendering
   =========================================================== */

/* ---------- preset bar ---------- */
function renderPresets() {
  const bar = document.getElementById('preset-bar');
  bar.innerHTML = '';
  for (const p of PRESET_DEFS) {
    const btn = document.createElement('button');
    btn.className = 'preset-btn' + (p.id === state.currentPreset ? ' active' : '');
    btn.dataset.preset = p.id;
    btn.setAttribute('role', 'radio');
    btn.setAttribute('aria-checked', p.id === state.currentPreset ? 'true' : 'false');
    btn.textContent = `${p.icon} ${p.label}`;
    btn.addEventListener('click', () => selectPreset(p.id));
    bar.appendChild(btn);
  }
}

/* ---------- tab bar ---------- */
function renderTabs() {
  const bar = document.getElementById('tab-bar');
  bar.innerHTML = '';
  for (const sk of SECTION_KEYS) {
    const sec = SECTIONS[sk];
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (sk === state.activeTab ? ' active' : '');
    btn.setAttribute('role', 'tab');
    btn.setAttribute('aria-selected', sk === state.activeTab ? 'true' : 'false');
    btn.dataset.tab = sk;
    btn.innerHTML = `<span class="tab-icon">${sec.icon}</span>${sec.label}`;
    btn.addEventListener('click', () => switchTab(sk));
    bar.appendChild(btn);
  }
}

/* ---------- tab content ---------- */
function renderTabContent() {
  const pane = document.getElementById('tab-content');
  pane.innerHTML = '';
  for (const sk of SECTION_KEYS) {
    const sec = SECTIONS[sk];
    const panel = document.createElement('section');
    panel.className = 'tab-panel' + (sk === state.activeTab ? ' active' : '');
    panel.id = `panel-${sk}`;
    panel.setAttribute('role', 'tabpanel');
    panel.setAttribute('aria-label', sec.label);

    if (sk === 'guided') {
      panel.appendChild(buildGuidedTab(sec));
    } else {
      panel.appendChild(buildCategoryTab(sec));
    }
    pane.appendChild(panel);
  }
}

/* ---------- guided tab ---------- */
function buildGuidedTab(sec) {
  const frag = document.createDocumentFragment();
  const desc = document.createElement('p');
  desc.className = 'tab-desc';
  desc.textContent = sec.desc;
  frag.appendChild(desc);

  const prompt = document.createElement('p');
  prompt.className = 'guided-prompt';
  prompt.textContent = 'What would you like to change?';
  frag.appendChild(prompt);

  const row = document.createElement('div');
  row.className = 'guided-row';

  // First dropdown: option select
  const sel1 = document.createElement('select');
  sel1.id = 'guided-select';
  const blank = document.createElement('option');
  blank.value = ''; blank.textContent = '— select —';
  sel1.appendChild(blank);
  for (const o of sec.options) {
    const opt = document.createElement('option');
    opt.value = o.id;
    opt.textContent = o.label;
    sel1.appendChild(opt);
  }
  sel1.addEventListener('change', () => onGuidedSelect(sel1.value));
  row.appendChild(sel1);

  // Second control: value select/toggle
  const valWrap = document.createElement('div');
  valWrap.id = 'guided-value-wrap';
  valWrap.style.display = 'none';
  row.appendChild(valWrap);

  // Actions
  const actions = document.createElement('div');
  actions.className = 'guided-actions';
  actions.id = 'guided-actions';
  actions.style.display = 'none';

  const keepBtn = document.createElement('button');
  keepBtn.className = 'guided-btn keep';
  keepBtn.id = 'guided-keep';
  keepBtn.innerHTML = '<span class="btn-icon">✅</span> Keep';
  keepBtn.addEventListener('click', keepGuidedChange);

  const revertBtn = document.createElement('button');
  revertBtn.className = 'guided-btn revert';
  revertBtn.id = 'guided-revert';
  revertBtn.innerHTML = '<span class="btn-icon">❌</span> Revert';
  revertBtn.addEventListener('click', revertGuidedChange);

  actions.appendChild(keepBtn);
  actions.appendChild(revertBtn);
  row.appendChild(actions);

  frag.appendChild(row);

  const hint = document.createElement('p');
  hint.className = 'guided-hint';
  hint.id = 'guided-hint';
  frag.appendChild(hint);

  return frag;
}

/* ---------- guided value controls ---------- */
function buildGuidedValueControl(optionId) {
  const opt = OPTION_MAP[optionId];
  if (!opt) return null;
  const wrap = document.getElementById('guided-value-wrap');
  wrap.innerHTML = '';
  wrap.style.display = '';

  if (opt.type === 'toggle') {
    const sel = document.createElement('select');
    sel.id = 'guided-value';
    const on = document.createElement('option'); on.value = 'true'; on.textContent = '✅ On';
    const off = document.createElement('option'); off.value = 'false'; off.textContent = '❌ Off';
    sel.appendChild(on); sel.appendChild(off);
    sel.addEventListener('change', () => onGuidedValue(optionId, sel.value === 'true'));
    wrap.appendChild(sel);
  } else if (opt.type === 'select') {
    const sel = document.createElement('select');
    sel.id = 'guided-value';
    for (const c of opt.choices) {
      const o = document.createElement('option');
      o.value = c.value;
      o.textContent = c.label;
      sel.appendChild(o);
    }
    sel.addEventListener('change', () => onGuidedValue(optionId, sel.value));
    wrap.appendChild(sel);
  }
}

/* ---------- category tab ---------- */
function buildCategoryTab(sec) {
  const frag = document.createDocumentFragment();
  const desc = document.createElement('p');
  desc.className = 'tab-desc';
  desc.textContent = sec.desc;
  frag.appendChild(desc);

  for (const o of sec.options) {
    const row = document.createElement('div');
    row.className = 'option-row';

    const label = document.createElement('label');
    label.htmlFor = `opt-${o.id}`;
    label.textContent = o.label;
    if (o.tooltip) label.title = o.tooltip;
    row.appendChild(label);

    const ctrl = document.createElement('div');
    ctrl.className = 'opt-control';

    if (o.type === 'toggle') {
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.id = `opt-${o.id}`;
      cb.checked = getDeep(state.committedConfig, o.id) ?? o.def ?? false;
      cb.addEventListener('change', () => applyDirectOption(o.id, cb.checked));
      ctrl.appendChild(cb);
    } else if (o.type === 'select') {
      const sel = document.createElement('select');
      sel.id = `opt-${o.id}`;
      for (const c of o.choices) {
        const opt = document.createElement('option');
        opt.value = c.value;
        opt.textContent = c.label;
        sel.appendChild(opt);
      }
      sel.value = String(getDeep(state.committedConfig, o.id) ?? o.def ?? '');
      sel.addEventListener('change', () => applyDirectOption(o.id, sel.value));
      ctrl.appendChild(sel);
    } else if (o.type === 'number') {
      const inp = document.createElement('input');
      inp.type = 'number';
      inp.id = `opt-${o.id}`;
      inp.min = o.min; inp.max = o.max; inp.step = o.step;
      const val = getDeep(state.committedConfig, o.id);
      inp.value = val != null ? val : (o.def ?? '');
      inp.addEventListener('input', () => applyDirectOption(o.id, parseFloat(inp.value) || 0));
      ctrl.appendChild(inp);
    } else if (o.type === 'text') {
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.id = `opt-${o.id}`;
      inp.value = getDeep(state.committedConfig, o.id) ?? o.def ?? '';
      inp.addEventListener('change', () => applyDirectOption(o.id, inp.value));
      ctrl.appendChild(inp);
    }

    row.appendChild(ctrl);
    frag.appendChild(row);
  }
  return frag;
}

/* ---------- config summary ---------- */
function renderSummary() {
  const el = document.getElementById('config-summary');
  el.innerHTML = '';

  // Preset chip
  const preset = PRESET_MAP[state.currentPreset];
  const chip = document.createElement('span');
  chip.className = 'summary-chip preset-chip';
  chip.textContent = `${preset.icon} ${preset.label}`;
  el.appendChild(chip);

  // Change chips
  for (const [key, data] of state.changes) {
    const chip = document.createElement('span');
    chip.className = 'summary-chip';
    chip.textContent = data.summary;
    el.appendChild(chip);
  }
}

/* ===========================================================
   Actions
   =========================================================== */

function announce(msg) {
  const ann = document.getElementById('live-announcer');
  ann.textContent = '';
  requestAnimationFrame(() => { ann.textContent = msg; });
}

function showToast(msg, duration) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._hide);
  t._hide = setTimeout(() => t.classList.remove('show'), duration || 1800);
}

function selectPreset(id) {
  const p = PRESET_MAP[id];
  if (!p) return;
  state.currentPreset = id;
  state.startingPreset = id;
  state.committedConfig = resolvePresetConfig(id);
  state.history = [];
  state.historyIndex = -1;
  state.changes.clear();
  state.isPreviewing = false;
  state.guidedOption = null;
  state.guidedValue = null;

  restartFireworks(state.committedConfig);
  renderPresets();
  renderSummary();
  switchTab('guided');
  announce(`Preset: ${p.label}`);
}

function switchTab(tabId) {
  if (!SECTIONS[tabId]) return;
  state.activeTab = tabId;

  // Update tab bar
  $$('.tab-btn').forEach(b => {
    const active = b.dataset.tab === tabId;
    b.classList.toggle('active', active);
    b.setAttribute('aria-selected', active ? 'true' : 'false');
  });

  // Update panels
  $$('.tab-panel').forEach(p => p.classList.toggle('active', p.id === `panel-${tabId}`));

  // Reset guided UI if switching away/back
  if (tabId !== 'guided') {
    resetGuidedRow();
  } else {
    resetGuidedRow();
  }

  // Rebuild summary when switching
  renderSummary();
}

function onGuidedSelect(optionId) {
  if (!optionId) {
    resetGuidedRow();
    return;
  }
  state.guidedOption = optionId;
  state.isPreviewing = false;
  state.guidedValue = null;

  buildGuidedValueControl(optionId);
  document.getElementById('guided-actions').style.display = 'none';
  document.getElementById('guided-hint').textContent = OPTION_MAP[optionId]?.tooltip || '';
}

function onGuidedValue(optionId, value) {
  state.guidedValue = value;
  state.isPreviewing = true;

  // Build draft: clone committed + apply change
  const opt = OPTION_MAP[optionId];
  state.draftConfig = deepMerge({}, state.committedConfig);
  opt.apply(state.draftConfig, value, fw);

  // Update preview
  if (opt.updateMode === 'restart') {
    restartFireworks(state.draftConfig);
  } else {
    liveUpdate(state.draftConfig);
  }

  document.getElementById('guided-actions').style.display = '';
  document.getElementById('guided-keep').disabled = false;
  document.getElementById('guided-revert').disabled = false;
  announce(`Previewing: ${opt.summary ? opt.summary(value) : opt.label}`);
}

function keepGuidedChange() {
  if (!state.isPreviewing || !state.guidedOption || state.guidedValue === null) return;

  const opt = OPTION_MAP[state.guidedOption];
  const value = state.guidedValue;

  // Push current committed to history
  state.history.push(deepMerge({}, state.committedConfig));
  if (state.history.length > 20) state.history.shift();
  state.historyIndex = state.history.length - 1;

  // Commit the draft
  state.committedConfig = deepMerge({}, state.draftConfig);
  state.isPreviewing = false;

  // Record change for summary
  const summary = opt.summary ? opt.summary(value) : `${opt.label}: ${value}`;
  state.changes.set(state.guidedOption, { label: opt.label, summary });

  renderSummary();
  const hint = document.getElementById('guided-hint');
  hint.textContent = `✅ Kept: ${summary}`;
  announce(`Kept: ${summary}`);

  // Reset guided row
  resetGuidedRow();
  // Rebuild category tabs to reflect new committed values
  rebuildCategoryTabs();
}

function revertGuidedChange() {
  if (!state.isPreviewing) return;

  state.isPreviewing = false;
  const opt = OPTION_MAP[state.guidedOption];

  // Restore preview from committed
  applyConfigToPreview(state.committedConfig, false);

  document.getElementById('guided-hint').textContent = `↩ Reverted ${opt.label}`;
  announce(`Reverted: ${opt.label}`);

  resetGuidedRow();
}

function resetGuidedRow() {
  state.guidedOption = null;
  state.guidedValue = null;
  state.isPreviewing = false;

  const sel1 = document.getElementById('guided-select');
  if (sel1) sel1.value = '';

  const wrap = document.getElementById('guided-value-wrap');
  if (wrap) { wrap.innerHTML = ''; wrap.style.display = 'none'; }

  const acts = document.getElementById('guided-actions');
  if (acts) acts.style.display = 'none';

  const hint = document.getElementById('guided-hint');
  if (hint) hint.textContent = '';
}

function applyDirectOption(optionId, value) {
  const opt = OPTION_MAP[optionId];
  if (!opt) return;

  // Apply to committed config
  opt.apply(state.committedConfig, value, fw);

  // Update preview
  if (opt.updateMode === 'restart') {
    restartFireworks(state.committedConfig);
  } else {
    // For live updates, setOptions is already called inside apply
    // But some applies call fw.setOptions, so this should already work
  }

  // Record change for summary
  const summary = opt.summary ? opt.summary(value) : `${opt.label}: ${value}`;
  state.changes.set(optionId, { label: opt.label, summary });
  renderSummary();
  announce(`Updated: ${opt.label}`);
}

function rebuildCategoryTabs() {
  // Re-render tab panel content for non-guided tabs so controls show committed values
  for (const sk of SECTION_KEYS) {
    if (sk === 'guided') continue;
    const panel = document.getElementById(`panel-${sk}`);
    if (panel) {
      const sec = SECTIONS[sk];
      panel.innerHTML = '';
      panel.appendChild(buildCategoryTab(sec));
    }
  }
}

function undo() {
  if (state.history.length === 0) return;
  const prev = state.history.pop();
  state.historyIndex = state.history.length - 1;
  state.committedConfig = prev;
  state.isPreviewing = false;
  resetGuidedRow();

  // Rebuild changes from scratch (simplification: clear them)
  state.changes.clear();
  restartFireworks(state.committedConfig);
  renderSummary();
  rebuildCategoryTabs();
  switchTab('guided');
  announce('Undid last change');
  showToast('↩ Undone');
}

function resetToStart() {
  selectPreset(state.startingPreset);
  showToast(`⟲ Reset to ${PRESET_MAP[state.startingPreset].label}`);
}

function copyConfig() {
  if (state.isPreviewing) {
    showToast('⚠️ Keep or revert the previewed change first', 2500);
    return;
  }

  // Build final config: committed + preset + core
  const finalConfig = deepMerge(deepMerge({}, CORE_CONFIG), state.committedConfig);
  // Remove container/mode/autoStart since user will set those
  delete finalConfig.container;

  const json = JSON.stringify(finalConfig, null, 2);
  const code = `const fireworks = new GrandFireworks(${json});`;

  navigator.clipboard.writeText(code).then(() => {
    showToast('📋 Configuration copied!');
    announce('Configuration copied to clipboard');
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = code;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('📋 Configuration copied!');
  });
}

/* ===========================================================
   Initialization
   =========================================================== */

function init() {
  renderPresets();
  renderTabs();
  renderTabContent();

  // Start fireworks with default preset
  restartFireworks(state.committedConfig);

  // Wire header buttons
  document.getElementById('restart-btn').addEventListener('click', () => {
    restartFireworks(effectiveConfig());
    showToast('↻ Restarted preview');
  });

  // Wire bottom actions
  document.getElementById('copy-btn').addEventListener('click', copyConfig);
  document.getElementById('undo-btn').addEventListener('click', undo);
  document.getElementById('reset-btn').addEventListener('click', resetToStart);

  // Keyboard: Escape reverts guided change
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && state.isPreviewing) {
      revertGuidedChange();
      e.preventDefault();
    }
  });

  // Render summary
  renderSummary();
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body></html>
